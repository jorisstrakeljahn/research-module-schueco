services:
  db:
    image: pgvector/pgvector:pg16
    container_name: trendscout-db
    environment:
      POSTGRES_USER: trendscout
      POSTGRES_PASSWORD: trendscout
      POSTGRES_DB: trendscout
    ports:
      # Host 5433 -> container 5432 (avoids clashing with a local Postgres on 5432)
      - "5433:5432"
    volumes:
      - trendscout_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trendscout -d trendscout"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trendscout_pgdata:
